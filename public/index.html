<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$CHINESEROT | The Forest of Decay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Sans+SC:wght@300;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --blood-red: #8b0000;
            --neon-gold: #ffd700;
            --jade-green: #00a86b;
            --ink-black: #050505;
        }

        body {
            background-color: var(--ink-black);
            color: #e5e7eb;
            font-family: 'Noto Sans SC', sans-serif;
            background-image: radial-gradient(circle at center, rgba(139, 0, 0, 0.15) 0%, transparent 70%);
        }

        .glow-text {
            color: var(--neon-gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            font-family: 'Zhi Mang Xing', cursive;
        }

        .calligraphy-font {
            font-family: 'Zhi Mang Xing', cursive;
        }

        .btn-rot {
            background: linear-gradient(45deg, var(--blood-red), #330000);
            color: var(--neon-gold);
            border: 2px solid var(--neon-gold);
            padding: 1rem 2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-rot:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .image-display {
            width: 100%;
            aspect-ratio: 1;
            background: #000;
            border: 1px solid var(--blood-red);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid var(--blood-red);
            border-bottom-color: var(--neon-gold);
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <nav class="p-8 flex justify-between items-center border-b border-red-900/30">
        <div class="text-4xl glow-text calligraphy-font">$CHINESEROT</div>
        <div class="flex gap-4">
            <a href="#" class="text-yellow-500 hover:text-white">Twitter</a>
            <a href="#" class="text-yellow-500 hover:text-white">Telegram</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12 text-center">
        <div class="max-w-4xl mx-auto bg-zinc-950 p-8 border border-yellow-900/50">
            <div class="grid md:grid-cols-2 gap-8 items-center">
                <div id="gen-result" class="image-display">
                    <span class="text-red-900/40 italic calligraphy-font text-xl">Awaiting Summoning...</span>
                </div>
                
                <div class="text-left space-y-6">
                    <h2 class="text-3xl text-yellow-500 calligraphy-font">Summon the Rot</h2>
                    <p class="text-gray-400 text-sm">Generate a unique digital artifact from the forest. This process takes 10-20 seconds.</p>
                    
                    <button id="gen-trigger" class="btn-rot w-full text-xl calligraphy-font">
                        Start Ritual
                    </button>
                    
                    <div id="gen-status" class="text-xs text-red-500 font-bold uppercase tracking-widest text-center min-h-[20px]"></div>
                </div>
            </div>
        </div>

        <div class="mt-12 max-w-4xl mx-auto">
            <div id="ca-copy" class="p-4 border border-dashed border-yellow-600 cursor-pointer hover:bg-yellow-950/20">
                <code class="text-yellow-500">5P4sZjYRbaawFZ6FyFgeaq1PYk57Bj5GL4UHXgnjpump</code>
            </div>
        </div>
    </main>

    <script>
        // --- FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDNu6OysHLjFDrLha87TUI7rJT2q0AGK1Y",
            authDomain: "chineserot-67bb3.firebaseapp.com",
            projectId: "chineserot-67bb3",
            storageBucket: "chineserot-67bb3.firebasestorage.app",
            messagingSenderId: "231858192926",
            appId: "1:231858192926:web:152533918c847f2e54e40f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const genTrigger = document.getElementById('gen-trigger');
        const genResult = document.getElementById('gen-result');
        const genStatus = document.getElementById('gen-status');

        async function generateRot() {
            genStatus.innerText = "OPENING PORTAL...";
            genTrigger.disabled = true;
            genResult.innerHTML = '<span class="loader"></span>';

            const prompt = "A surreal chinese forest with decaying digital elements, dark moss, neon red lighting, 3D render";

            try {
                // Ensure auth is ready
                if (!auth.currentUser) await auth.signInAnonymously();

                const response = await fetch('/api/summon-rot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                // Check if response is valid before parsing
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server returned ${response.status}: ${errorText.substring(0, 50)}`);
                }

                const rawContent = await response.text();
                if (!rawContent) {
                    throw new Error("Server sent an empty response. The portal timed out.");
                }

                const data = JSON.parse(rawContent);

                if (data.predictions && data.predictions[0]?.bytesBase64Encoded) {
                    const b64 = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                    genResult.innerHTML = `<img src="${b64}" class="w-full h-full object-cover">`;
                    genStatus.innerText = "SUCCESSFULLY SUMMONED";
                    
                    // Save to Firestore
                    await db.collection('artifacts').doc('chineserot-67bb3').collection('public').doc('data').collection('creations').add({
                        imageUrl: b64,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        userId: auth.currentUser.uid
                    });
                } else {
                    throw new Error("Invalid data format received from API.");
                }

            } catch (err) {
                console.error("Summoning error:", err);
                genStatus.innerText = "RITUAL FAILED: " + err.message;
                genResult.innerHTML = '<span class="text-red-500 text-xs">The forest is silent.</span>';
            } finally {
                genTrigger.disabled = false;
            }
        }

        genTrigger.addEventListener('click', generateRot);

        document.getElementById('ca-copy').addEventListener('click', () => {
            navigator.clipboard.writeText("5P4sZjYRbaawFZ6FyFgeaq1PYk57Bj5GL4UHXgnjpump");
            genStatus.innerText = "CA COPIED TO SCROLL";
        });
    </script>
</body>
</html>
