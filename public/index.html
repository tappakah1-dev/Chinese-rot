<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$CHINESEROT | The Forest of Decay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Sans+SC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood-red: #8b0000;
            --neon-gold: #ffd700;
            --jade-green: #00a86b;
            --ink-black: #050505;
            --paper-tan: #f4ecd8;
        }

        body {
            background-color: var(--ink-black);
            color: #e5e7eb;
            font-family: 'Noto Sans SC', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at center, rgba(139, 0, 0, 0.15) 0%, transparent 70%),
                url("https://www.transparenttextures.com/patterns/dark-matter.png");
            line-height: 1.6;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(90deg, var(--blood-red) 2px, transparent 2px) 0 0,
                linear-gradient(0deg, var(--blood-red) 2px, transparent 2px) 0 0;
            background-size: 40px 40px;
            opacity: 0.05;
            pointer-events: none;
            z-index: 1;
        }

        .glow-text {
            color: var(--neon-gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5), 0 0 30px rgba(139, 0, 0, 0.3);
            font-family: 'Zhi Mang Xing', cursive;
        }

        .calligraphy-font {
            font-family: 'Zhi Mang Xing', cursive;
        }

        .btn-rot {
            background: linear-gradient(45deg, var(--blood-red), #330000);
            color: var(--neon-gold);
            font-weight: 700;
            padding: 1rem 2rem;
            border-radius: 2px;
            border: 2px solid var(--neon-gold);
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.5);
            transition: 0.3s;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-rot:hover:not(:disabled) {
            background: var(--neon-gold);
            color: var(--blood-red);
            box-shadow: 0 0 30px var(--neon-gold);
            transform: scale(1.05);
        }

        .btn-share {
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            font-size: 0.75rem;
            padding: 0.5rem 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            display: none; 
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .gen-container {
            background: rgba(15, 2, 2, 0.9);
            border: 2px solid var(--neon-gold);
            position: relative;
            box-shadow: 0 0 40px rgba(139,0,0,0.5);
            clip-path: polygon(0 5%, 5% 0, 95% 0, 100% 5%, 100% 95%, 95% 100%, 5% 100%, 0 95%);
        }

        .image-display {
            width: 100%;
            aspect-ratio: 1;
            background: #000;
            border: 1px solid var(--blood-red);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid var(--blood-red);
            border-bottom-color: var(--neon-gold);
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .carousel-container {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px 40px;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }
        .carousel-container::-webkit-scrollbar { display: none; }

        .carousel-card {
            min-width: 300px;
            background: #000;
            border: 2px solid var(--blood-red);
        }

        .story-border {
            border: 1px solid rgba(255, 215, 0, 0.3);
            background-image: radial-gradient(circle at top right, rgba(139, 0, 0, 0.2), transparent);
            padding: 2rem;
        }
    </style>
</head>
<body>

    <nav class="pt-16 pb-8 px-8 flex justify-between items-center relative z-10 border-b border-red-900/30">
        <div class="text-4xl md:text-6xl glow-text calligraphy-font">
            <span class="text-red-600 mr-2">ROT</span> $CHINESEROT
        </div>
        <div class="flex gap-8 text-sm font-bold uppercase tracking-widest text-yellow-500">
            <a href="#" target="_blank" class="hover:text-white transition-colors">Twitter</a>
            <a href="#" target="_blank" class="hover:text-white transition-colors">Telegram</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 pt-16 text-center relative z-10 pb-40">
        
        <div class="mb-24">
            <h1 class="text-7xl md:text-[10rem] glow-text calligraphy-font leading-none mb-6">Chinese Rot</h1>
            <p class="text-2xl text-red-100/80 italic calligraphy-font max-w-2xl mx-auto tracking-widest">
                "The algorithm decays. The forest provides. The dragon watches."
            </p>
        </div>

        <!-- Generator Section -->
        <section class="max-w-5xl mx-auto mb-12">
            <div class="gen-container p-1 rounded-sm">
                <div class="bg-black p-8 md:p-12 grid md:grid-cols-2 gap-12 items-center">
                    <div class="image-display rounded border-2 border-yellow-900/50" id="gen-result">
                        <div class="text-red-900/60 text-sm italic calligraphy-font text-2xl">Awaiting Summoning...</div>
                    </div>
                    <div class="text-left space-y-8">
                        <div class="flex items-center gap-4">
                            <div class="h-px flex-1 bg-yellow-600"></div>
                            <h2 class="text-4xl text-yellow-500 calligraphy-font">Summon Ritual</h2>
                            <div class="h-px flex-1 bg-yellow-600"></div>
                        </div>
                        <button id="gen-trigger" class="btn-rot w-full py-8 text-2xl calligraphy-font">
                            Summon My Rot
                        </button>
                        <button id="share-x" class="btn-share w-full">
                            Share on X
                        </button>
                        <div id="gen-status" class="text-xs text-red-500 font-bold uppercase tracking-widest text-center min-h-[24px] bg-red-950/20 py-2 border border-red-900/30"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- CA Section -->
        <div class="max-w-5xl mx-auto mb-40">
            <div id="ca-copy" class="cursor-pointer bg-black/80 border-2 border-yellow-600 p-8 rounded-sm flex flex-col md:flex-row items-center justify-between gap-6 transition-all hover:shadow-[0_0_50px_rgba(255,215,0,0.2)]">
                <div class="flex items-center gap-4">
                    <span class="text-red-600 font-bold calligraphy-font text-3xl">CA</span>
                    <div class="h-8 w-px bg-yellow-900"></div>
                </div>
                <code class="text-yellow-500 font-mono text-sm md:text-lg tracking-widest">5P4sZjYRbaawFZ6FyFgeaq1PYk57Bj5GL4UHXgnjpump</code>
                <span class="text-xs bg-yellow-600 text-black font-bold px-6 py-2 uppercase tracking-tighter">Copy Scroll</span>
            </div>
        </div>

        <!-- Video Carousel -->
        <section class="mb-40 py-10 relative">
            <h2 class="text-4xl text-yellow-500 calligraphy-font mb-12">Visual Decay</h2>
            <div class="carousel-container" id="video-carousel">
                <!-- TikTok embeds go here as in previous version -->
                <div class="carousel-card p-4 text-xs text-gray-500 italic">Historical data fragment...</div>
                <div class="carousel-card p-4 text-xs text-gray-500 italic">Decay log 001...</div>
                <div class="carousel-card p-4 text-xs text-gray-500 italic">Rot signature alpha...</div>
            </div>
        </section>

    </main>

    <script>
        const apiKey = ""; // Provided by environment
        const genTrigger = document.getElementById('gen-trigger');
        const shareX = document.getElementById('share-x');
        const genResult = document.getElementById('gen-result');
        const genStatus = document.getElementById('gen-status');

        async function generateRot() {
            const creatures = ["cat", "capybara", "dragon", "koi", "shiba"];
            const styles = ["surreal brainrot", "dark fantasy", "cyber-traditional", "ink calligraphy"];
            const creature = creatures[Math.floor(Math.random() * creatures.length)];
            const style = styles[Math.floor(Math.random() * styles.length)];
            
            const prompt = `A ${style} ${creature} in a dark mossy Chinese forest with glowing red lanterns and gold accents, 8k, cinematic, uncanny.`;

            genTrigger.disabled = true;
            genStatus.innerText = "FERMENTING IN THE ABYSS...";
            genResult.innerHTML = '<span class="loader"></span>';
            shareX.style.display = 'none';

            let retries = 0;
            const maxRetries = 5;

            const callApi = async () => {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: prompt }],
                        parameters: { sampleCount: 1 }
                    })
                });

                if (!response.ok) throw new Error('Generation failed');
                return await response.json();
            };

            const attempt = async () => {
                try {
                    const result = await callApi();
                    const bytes = result.predictions?.[0]?.bytesBase64Encoded;
                    if (!bytes) throw new Error('No image returned');

                    const imageUrl = `data:image/png;base64,${bytes}`;
                    genResult.innerHTML = `<img src="${imageUrl}" class="w-full h-full object-cover">`;
                    genStatus.innerText = "MANIFESTED.";
                    shareX.style.display = 'flex';
                } catch (error) {
                    if (retries < maxRetries) {
                        retries++;
                        const delay = Math.pow(2, retries) * 500;
                        setTimeout(attempt, delay);
                    } else {
                        genResult.innerHTML = `<div class="p-4 text-red-500 text-xs">SUMMONING FAILED. THE FOREST IS UNSTABLE.</div>`;
                        genStatus.innerText = "ERROR";
                    }
                } finally {
                    if (retries === 0 || retries === maxRetries) genTrigger.disabled = false;
                }
            };

            attempt();
        }

        genTrigger.addEventListener('click', generateRot);
        
        document.getElementById('ca-copy').addEventListener('click', () => {
            const txt = "5P4sZjYRbaawFZ6FyFgeaq1PYk57Bj5GL4UHXgnjpump";
            const el = document.createElement('textarea');
            el.value = txt;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            genStatus.innerText = "SCROLL COPIED.";
        });
    </script>
</body>
</html>
