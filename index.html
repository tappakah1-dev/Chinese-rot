<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$CHINESEROT | The Forest of Decay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Sans+SC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood-red: #8b0000;
            --neon-gold: #ffd700;
            --jade-green: #00a86b;
            --ink-black: #050505;
        }

        body {
            background-color: var(--ink-black);
            color: #e5e7eb;
            font-family: 'Noto Sans SC', sans-serif;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #1a0a0a 0%, #050505 100%);
            line-height: 1.6;
        }

        .glow-text {
            color: var(--neon-gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5), 0 0 30px rgba(139, 0, 0, 0.3);
            font-family: 'Zhi Mang Xing', cursive;
        }

        .calligraphy-font {
            font-family: 'Zhi Mang Xing', cursive;
        }

        .btn-rot {
            background: linear-gradient(45deg, var(--blood-red), #330000);
            color: var(--neon-gold);
            font-weight: 700;
            padding: 1rem 2rem;
            border-radius: 4px;
            border: 1px solid var(--neon-gold);
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.5);
            transition: 0.3s;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .btn-rot:hover:not(:disabled) {
            background: var(--neon-gold);
            color: var(--blood-red);
            box-shadow: 0 0 30px var(--neon-gold);
        }

        .gen-container {
            background: rgba(10, 2, 2, 0.85);
            border: 3px solid var(--blood-red);
            box-shadow: 0 0 50px rgba(139,0,0,0.3);
            position: relative;
        }

        .image-display {
            width: 100%;
            aspect-ratio: 1;
            background: #000;
            border: 2px solid #220000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .image-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid var(--blood-red);
            border-bottom-color: var(--neon-gold);
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <nav class="pt-12 pb-8 px-8 flex justify-between items-center relative z-10">
        <div class="text-3xl md:text-5xl glow-text calligraphy-font">【 $CHINESEROT 】</div>
        <div class="flex gap-6 text-xs font-bold uppercase tracking-widest text-yellow-500">
            <a href="#" class="hover:text-white">X</a>
            <a href="#" class="hover:text-white">TG</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 pt-12 text-center relative z-10 pb-40">
        
        <div class="mb-20">
            <h1 class="text-6xl md:text-9xl glow-text calligraphy-font mb-4">Chinese Rot</h1>
            <p class="text-xl text-red-100/80 italic calligraphy-font max-w-2xl mx-auto">
                "The algorithm decays. The forest provides."
            </p>
        </div>

        <section class="max-w-4xl mx-auto mb-32">
            <div class="gen-container p-6 md:p-10 rounded-lg grid md:grid-cols-2 gap-10 items-center">
                <div class="image-display rounded" id="gen-result">
                    <div class="text-red-900/40 text-xs italic">Awaiting Summoning...</div>
                </div>
                <div class="text-left space-y-6">
                    <h2 class="text-3xl text-yellow-500 calligraphy-font">The ROT Generator</h2>
                    <p class="text-sm text-gray-400 uppercase tracking-widest leading-loose">
                        Summon a digital hallucination from the depths of the moss.
                    </p>
                    <button id="gen-trigger" class="btn-rot w-full py-6 text-xl">Summon My Rot</button>
                    <div id="gen-status" class="text-[10px] text-red-500 font-bold uppercase tracking-widest text-center min-h-[20px] bg-black/40 p-1 rounded mt-2"></div>
                </div>
            </div>
        </section>

        <div class="max-w-3xl mx-auto">
            <div id="ca-copy" class="cursor-pointer bg-black/80 border-2 border-red-900 p-6 rounded flex flex-col md:flex-row items-center justify-between gap-4 transition-transform hover:scale-[1.02]">
                <span class="text-red-600 font-bold">CA:</span>
                <code class="text-yellow-500 font-mono text-xs md:text-base">5P4sZjYRbaawFZ6FyFgeaq1PYk57Bj5GL4UHXgnjpump</code>
                <span class="text-xs bg-red-900 text-white px-3 py-1 rounded">COPY</span>
            </div>
        </div>

    </main>

    <script>
        const apiKey = "AIzaSyCxHO8s_g8ScXq3qDPe-cA-UCMy7OTK6oQ"; 
        
        const genTrigger = document.getElementById('gen-trigger');
        const genResult = document.getElementById('gen-result');
        const genStatus = document.getElementById('gen-status');

        const creatures = ["cat", "capybara", "shrimp", "axolotl", "frog"];
        const costumes = ["ramen bowl", "bamboo armor", "lotus leaf hat", "glowing lantern"];

        async function generateRot() {
            const creature = creatures[Math.floor(Math.random() * creatures.length)];
            const costume = costumes[Math.floor(Math.random() * costumes.length)];
            
            const promptText = `A surreal and uncanny ${creature} wearing a ${costume}, sitting in a dark mossy Chinese forest, the text '$CHINESEROT' is glowing in the background, 3D render style, viral brainrot aesthetic, dramatic lighting.`;

            genStatus.innerText = "FERMENTING...";
            genTrigger.disabled = true;
            genResult.innerHTML = '<span class="loader"></span>';

            try {
                // Using the specific predict endpoint with the provided key
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        instances: [{ prompt: promptText }],
                        parameters: { 
                            sampleCount: 1,
                            aspectRatio: "1:1"
                        }
                    })
                });

                const data = await response.json();

                if (response.ok && data.predictions && data.predictions[0]?.bytesBase64Encoded) {
                    const b64 = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                    genResult.innerHTML = `<img src="${b64}" class="w-full h-full object-cover animate-pulse shadow-[0_0_20px_rgba(255,215,0,0.2)]">`;
                    genStatus.innerText = "MANIFESTED.";
                    setTimeout(() => genResult.querySelector('img').classList.remove('animate-pulse'), 1000);
                } else if (response.status === 403) {
                    throw new Error("403 Forbidden: Key restricted or Billing not enabled.");
                } else {
                    const errorDetails = data.error?.message || "Check API Key restrictions or safety filters.";
                    throw new Error(errorDetails);
                }
            } catch (err) {
                console.error("Summoning error:", err);
                genResult.innerHTML = `<div class="text-red-500 text-[10px] p-6 text-center uppercase">Portal Closed:<br>${err.message}</div>`;
                genStatus.innerText = "ACCESS RESTRICTED";
            } finally {
                genTrigger.disabled = false;
            }
        }

        genTrigger.addEventListener('click', generateRot);

        document.getElementById('ca-copy').addEventListener('click', () => {
            const txt = "5P4sZjYRbaawFZ6FyFgeaq1PYk57Bj5GL4UHXgnjpump";
            const el = document.createElement('textarea');
            el.value = txt;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            genStatus.innerText = "COPIED TO CLIPBOARD";
            setTimeout(() => genStatus.innerText = "", 2000);
        });
    </script>
</body>
</html>
